<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sailing Coach AI</title>
<style>
:root {
  --bg: #07111f; --s1: #0c1a2e; --s2: #112240; --s3: #1a3155;
  --accent: #0ea5e9; --accent2: #38bdf8;
  --green: #22c55e; --yellow: #f59e0b; --red: #ef4444;
  --text: #e8f4ff; --muted: #6b90b8; --border: #1e3a5f; --r: 12px;
  --font: 'Georgia', serif; --mono: 'Courier New', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
header { background: linear-gradient(180deg,#0a1628,#07111f); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; }
.header-left { display: flex; align-items: center; gap: 10px; }
.header-logo { font-size: 28px; }
.header-title { font-size: 18px; font-weight: 700; }
.header-right { display: flex; gap: 8px; }
.hdr-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; width: 66px; height: 66px; border-radius: 12px; border: 1px solid var(--border); background: var(--s2); cursor: pointer; font-size: 24px; color: var(--text); position: relative; transition: all .2s; }
.hdr-btn .hl { font-size: 12px; font-weight: 700; font-family: var(--mono); color: var(--muted); }
.badge { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-family: var(--mono); }
.badge.on { display: flex; }
.breadcrumb { background: var(--s1); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 13px; overflow-x: auto; white-space: nowrap; }
.bc-item { color: var(--muted); cursor: pointer; transition: color .2s; }
.bc-item:hover { color: var(--accent2); }
.bc-item.active { color: var(--text); font-weight: 700; cursor: default; }
.bc-sep { color: var(--border); }
.screen { display: none; max-width: 680px; margin: 0 auto; padding: 16px; }
.screen.active { display: block; }
.card { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); padding: 18px; margin-bottom: 14px; }
.card-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--accent); font-family: var(--mono); margin-bottom: 14px; }
.field { margin-bottom: 14px; }
.field label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-family: var(--mono); display: block; margin-bottom: 6px; }
.field input, .field select, .field textarea { width: 100%; background: var(--s2); border: 2px solid var(--border); border-radius: 10px; color: var(--text); padding: 13px 16px; font-size: 17px; font-weight: 600; font-family: var(--font); transition: border-color .2s; appearance: none; -webkit-appearance: none; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
.field-row { display: flex; gap: 10px; margin-bottom: 14px; }
.field-row .field { flex: 1; margin-bottom: 0; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 700; font-family: var(--mono); transition: all .2s; }
.btn:active { transform: scale(.96); }
.btn-primary { background: linear-gradient(135deg,#0ea5e9,#0369a1); color: white; width: 100%; font-size: 17px; padding: 18px; }
.btn-secondary { background: var(--s2); border: 1px solid var(--border); color: var(--muted); }
.btn-danger { background: #2d0a0a; border: 1px solid var(--red); color: var(--red); }
.btn-green { background: #052e16; border: 1px solid var(--green); color: var(--green); }
.btn-row { display: flex; gap: 10px; margin-bottom: 14px; }
.btn-row .btn { flex: 1; }
.toggle { display: flex; background: var(--s2); border-radius: 10px; padding: 4px; border: 2px solid var(--border); margin-bottom: 14px; }
.toggle button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 700; font-family: var(--mono); background: transparent; color: var(--muted); transition: all .2s; }
.toggle button.on { background: var(--accent); color: white; }
.list-item { background: var(--s2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: space-between; }
.list-item:hover { border-color: var(--accent); }
.li-main { font-size: 16px; font-weight: 700; }
.li-sub { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-top: 3px; }
.li-arrow { color: var(--muted); font-size: 18px; }
.rec-area { background: var(--s2); border-radius: 12px; border: 1px dashed var(--border); padding: 24px; text-align: center; }
.rec-circle { width: 88px; height: 88px; border-radius: 50%; border: none; cursor: pointer; font-size: 34px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; transition: all .2s; }
.rec-circle.idle { background: #ef444418; border: 2px solid var(--red); }
.rec-circle.rec { background: var(--red); animation: pulse 1s infinite; }
.rec-circle.pause { background: #f59e0b20; border: 2px solid var(--yellow); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 #ef444455} 50%{box-shadow:0 0 0 14px transparent} }
.rec-status { font-size: 15px; color: var(--muted); font-family: var(--mono); margin-bottom: 6px; }
.rec-timer { font-size: 28px; font-weight: 700; font-family: var(--mono); display: none; margin-bottom: 10px; }
.rec-btn-row { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
.rec-sm-btn { background: transparent; border-radius: 8px; font-size: 13px; padding: 8px 18px; cursor: pointer; font-weight: 700; font-family: var(--mono); transition: all .2s; }
.rec-sm-btn.stop { border: 1px solid var(--red); color: var(--red); display: none; }
.rec-sm-btn.stop.show { display: inline-flex; }
.rec-sm-btn.reset { border: 1px solid var(--border); color: var(--muted); }
.rec-saved { background: #052e16; border: 1px solid var(--green); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--green); font-family: var(--mono); margin-top: 10px; display: none; }
.setup-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 400; overflow-y: auto; }
.setup-screen.on { display: block; }
.setup-inner { max-width: 500px; margin: 0 auto; padding: 24px 16px 80px; }
.setup-logo { text-align: center; font-size: 48px; margin-bottom: 8px; }
.setup-h { text-align: center; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.setup-sub { text-align: center; font-size: 13px; color: var(--muted); font-family: var(--mono); margin-bottom: 28px; }
